# Blueprint 1 — NeMo CPT config for Solana Transaction Foundation Model
# Reference: https://build.nvidia.com/nvidia/build-your-own-transaction-foundation-model

model:
  base: meta/llama-3.1-nemotron-nano-8b-v1
  output_name: solana-tx-foundation-1.5b
  dtype: bfloat16
  hub_model_id: solanaclawd/solana-tx-foundation-1.5b

training:
  type: continued_pretraining
  num_epochs: 1
  learning_rate: 2.0e-5
  warmup_steps: 100
  batch_size: 8
  gradient_accumulation_steps: 4
  max_seq_length: 4096
  packing: true

data:
  # Generated by blueprints/transaction-foundation-model/dataset_builder.py
  train: data/tx_foundation_cpt.jsonl
  processed: data/tx_foundation_cpt_processed
  manifest: data/tx_foundation_cpt_manifest.json
  format: text   # NeMo CPT expects {"text": "..."} records

# NIM endpoint after fine-tuning completes
# Set CLAWD_TX_NIM_URL in your environment to override.
inference:
  nim_url: ${CLAWD_TX_NIM_URL:-https://integrate.api.nvidia.com/v1}
  model_name: solana-tx-foundation-1.5b
  max_tokens: 512
  temperature: 0.1

post_train:
  local_output: outputs/solana-tx-foundation-1.5b/sft
  eval_output: data/tx_foundation_eval.json
  release_summary: outputs/tx_foundation_post_train_summary.json
  continuation_script: nvidia/blueprints/transaction-foundation-model/post_train.py
