app = "solana-clawd-rag"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.fly"

[env]
  CLAWD_RAG_STORE = "/app/data/nvidia_rag_store"
  CLAWD_RAG_GEN_MODEL = "nvidia/nemotron-3-nano-30b-a3b"
  CLAWD_RAG_OLLAMA_MODEL = "8bit/solana-clawd-core-ai:latest"
  CLAWD_RAG_CONTEXT_ONLY = "0"

[http_service]
  internal_port = 8765
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"
