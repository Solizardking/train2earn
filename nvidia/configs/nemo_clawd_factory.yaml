name: solana-nemoclawd-nvidia-trading-factory
version: "2026-06-21"
schema_version: "2026-06-21"
release_channel: production
description: >
  End-to-end NVIDIA AI Blueprint integration for Solana Clawd.
  Six blueprints (TFM, portfolio-opt, distillation, signal-discovery,
  enterprise-rag, AIQ) unified under a single factory config.
  Nemo Clawd adds the Core AI runtime as a NemoClaw-style sandboxed agent
  blueprint with routed inference, network policy, lifecycle commands, and
  training hooks.
  All execution is paper-mode by default; live requires explicit gate.
default_mode: paper
artifact_root: data/strategies

trust:
  default: observer
  allowed_default_modes: [observer, paper]
  live_mode_generated: false
  live_requires:
    - vulcan_preflight_ready
    - explicit_operator_approval
    - wallet_limits_loaded_from_secret_manager
    - dry_run_rehearsal_passed

release_contract:
  required_artifacts:
    - data/strategies/nemo_clawd_core_inventory.json
    - data/strategies/nemo_clawd_blueprint.json
    - data/strategies/nvidia_clawd_agent_plan.json
    - data/strategies/strategy_manifest.json
  verification:
    layout: python3 scripts/organize_ai_training.py --check
    nvidia: python3 nvidia/scripts/verify_nvidia.py --strict
    configs: python3 nvidia/scripts/validate_configs.py --strict
  publish_targets:
    hugging_face_org: solanaclawd
    onchain_registry: https://onchain.x402.wtf
    github: https://github.com/solizardking/solana-clawd-ai-training

# ── Nemo Clawd / Core AI Integration ─────────────────────────────────────────
nemo_clawd:
  name: Nemo Clawd
  upstream: https://github.com/NVIDIA/NemoClaw
  upstream_docs: https://docs.nvidia.com/nemoclaw/latest/
  local_builder: nvidia/integration/nemo_clawd.py
  core_ai_root: ../core-ai
  source_mount_mode: read-only
  outputs:
    inventory: data/strategies/nemo_clawd_core_inventory.json
    blueprint: data/strategies/nemo_clawd_blueprint.json
  required_paths:
    - ../core-ai
    - ../core-ai/.agents
    - ../core-ai/.clawd-plugin
    - ../core-ai/.github
    - ../core-ai/clawd-agents
    - ../core-ai/clawd-code
    - ../core-ai/clawd-grok
    - ../core-ai/docs
    - ../core-ai/helius-cli
    - ../core-ai/helius-cursor
    - ../core-ai/helius-mcp
    - ../core-ai/helius-plugin
    - ../core-ai/helius-skills
    - ../core-ai/knowledge
    - ../core-ai/mcp-server
    - ../core-ai/scripts
    - ../core-ai/v3
  network_policy:
    default: deny
    dns_policy: allowlisted
    outbound_requires_tls: true
    allowed_egress:
      - https://integrate.api.nvidia.com
      - https://api-inference.huggingface.co
      - https://fal.run
      - https://queue.fal.run
      - https://huggingface.co
      - https://onchain.x402.wtf
      - https://api.mainnet-beta.solana.com
      - https://*.helius.dev
      - http://localhost:11434
    blocked_egress:
      - file://*
      - ssh://*
      - ftp://*
  lifecycle:
    generate: python3 nvidia/integration/nemo_clawd.py --write
    plan: python3 nvidia/integration/nemo_clawd_agent.py --mode paper
    verify: python3 nvidia/scripts/verify_nvidia.py --strict
    validate_configs: python3 nvidia/scripts/validate_configs.py --strict
  observability:
    inventory_hashes: true
    emit_manifest: true
    output_summary: outputs/nemo_clawd_release_summary.json

# ── Models ────────────────────────────────────────────────────────────────────
models:
  # NIM primary (fast reasoning, signal verdicts, portfolio narration)
  reasoning: nvidia/nemotron-3-nano-30b-a3b

  # NIM ultra (maximum reasoning depth — distillation teacher, complex analysis)
  ultra: nvidia/nemotron-3-ultra-550b-a55b

  # NIM teacher (balanced distillation and SFT labeling)
  research: nvidia/nemotron-3-super-120b-a12b

  # Base for local fine-tune (Blueprint 1 SFT stage)
  base: Qwen/Qwen2.5-1.5B-Instruct

  # Published student adapter (live on Hub)
  adapter: solanaclawd/solana-clawd-core-ai-1.5b-lora

  # Transaction foundation model (CPT + SFT, Blueprint 1)
  tx_foundation: solanaclawd/solana-tx-foundation-1.5b

  # RAG embedding + reranker (Blueprint 5)
  embedding: nvidia/nv-embedqa-e5-v5
  reranker: nvidia/nv-rerankqa-mistral-4b-v3

# ── NIM endpoint routing ──────────────────────────────────────────────────────
# Runtime resolution order (clawd_nim_bridge.py / quantitative_signal_agent.py):
#
#   NVIDIA_API_KEY   →  NIM API        (models.reasoning = Nemotron Nano 30B)
#   HF_TOKEN         →  HF Inference   (nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16)
#   FAL_API_KEY/FAL_KEY → fal Model API (nvidia/nemotron-3-nano-omni)
#   CLAWD_INFERENCE_URL → self-hosted
#   CLAWD_ROUTER_KEY →  clawd-box-router.fly.dev free tier
#   (fallback)       →  Ollama localhost:11434
#
# Model overrides:
#   NVIDIA_MODEL=nvidia/nemotron-3-ultra-550b-a55b   # force ultra
#   NVIDIA_USE_PIPELINE=1                             # use local HF pipeline()
nim_routing:
  nim_api_key_var: NVIDIA_API_KEY
  hf_token_var: HF_TOKEN
  fal_key_vars: [FAL_API_KEY, FAL_KEY]
  fal_model_var: FAL_MODEL_ID
  clawd_url_var: CLAWD_INFERENCE_URL
  clawd_router_key_var: CLAWD_ROUTER_KEY
  model_override_var: NVIDIA_MODEL
  pipeline_override_var: NVIDIA_USE_PIPELINE
  timeout_s: 120
  retries: 2
  fallback_order:
    - nim_api
    - hf_inference
    - fal
    - clawd_inference_url
    - clawd_router
    - ollama

# ── Inputs ────────────────────────────────────────────────────────────────────
inputs:
  strategy_manifest: data/strategies/strategy_manifest.json
  agent_plan: data/strategies/nvidia_clawd_agent_plan.json
  cufolio_handoff: data/strategies/cufolio_mean_cvar_handoff.json
  rise_data_plan: data/strategies/rise_market_data_plan.json
  vulcan_command_plans: data/strategies/vulcan_command_plans.json
  rag_sources:
    - README.md
    - dataset_card.md
    - model_card.md
    - onchain.md
    - trading_factory/README.md
    - nvidia/README.md
    - nvidia/configs/nim_config.yaml

# ── Integration entrypoints ───────────────────────────────────────────────────
integration:
  nemo_clawd_core: nvidia/integration/nemo_clawd.py
  nim_bridge: nvidia/integration/clawd_nim_bridge.py
  nemo_agent: nvidia/integration/nemo_clawd_agent.py
  trading_factory_bridge: nvidia/integration/trading_factory_nvidia.py
  dataset_builder: nvidia/integration/dataset_nvidia_sft.py

# ── Workflow configs (one entry per blueprint) ────────────────────────────────
workflows:

  # Blueprint 1 — Transaction Foundation Model
  transaction_foundation_model:
    enabled: true
    config: nvidia/configs/solana_tx_foundation.yaml
    nemo_config: nvidia/configs/pretrain_solana_decoder.yaml
    pipeline: nvidia/blueprints/transaction-foundation-model/pipeline.py
    cpt_data: data/tx_foundation_cpt.jsonl           # CPT records (Jupiter+SFT+BQ)
    sft_data: data/solana_clawd_merged.jsonl          # 30K instruction pairs
    output_model: solanaclawd/solana-tx-foundation-1.5b
    hf_dataset: solanaclawd/solana-tx-foundation-cpt
    status: training                                   # pipeline.py --stages cpt sft evaluate
    preflight: python3 nvidia/blueprints/transaction-foundation-model/preflight.py
    post_train: python3 nvidia/blueprints/transaction-foundation-model/post_train.py
    bq_collector: nvidia/blueprints/transaction-foundation-model/bigquery_collector.py
    bq_dataset: bigquery-public-data.crypto_solana_mainnet_us
    bq_bulk_cmd: >-
      python3 nvidia/blueprints/transaction-foundation-model/bigquery_collector.py
      --limit 100000 --days 90 --append --output data/tx_foundation_cpt.jsonl

  # Blueprint 2 — Quantitative Portfolio Optimization
  portfolio_optimization:
    enabled: true
    runner: nvidia/blueprints/portfolio-optimization/cufolio_clawd.py
    objective: mean_cvar
    cvar_alpha: 0.95
    max_cvar: 0.12
    max_leverage: 1.0
    markets: [SOL, BTC, ETH, JUP, SOL-PERP, BTC-PERP]
    price_source: phoenix_vulcan          # real candles via vulcan CLI
    # When Phoenix mark prices are near-constant (common over short windows),
    # phoenix_prices.py auto-anchors a synthetic series to the real last price
    # so the CVaR optimizer receives statistically valid return distributions.
    price_fallback: synthetic_anchored
    gate: paper
    vulcan_mode: paper
    status: running

  # Blueprint 3 — Model Distillation
  distillation:
    enabled: true
    teacher: nvidia/nemotron-3-nano-30b-a3b   # swap for ultra for quality
    student: Qwen/Qwen2.5-1.5B-Instruct
    method: response_distillation
    output: data/distilled_trading_factory.jsonl
    hf_dataset: solanaclawd/solana-clawd-nvidia-trading-factory-instruct
    status: ready_to_publish

  # Blueprint 4 — Quantitative Signal Discovery Agent
  signal_discovery:
    enabled: true
    runner: nvidia/blueprints/signal-discovery/quantitative_signal_agent.py
    markets: [SOL, BTC, ETH, JUP, PYTH, JTO]
    timeframe: 1h
    price_source: phoenix_vulcan
    nim_model: nvidia/nemotron-3-nano-30b-a3b
    accept:
      min_abs_ic: 0.02
      max_p_value: 0.05
      max_drawdown_pct: 8
      min_composite_strength: 0.4
    sft_log: data/nvidia_signal_log.jsonl
    report: data/signal_discovery_report.json
    status: running

  # Blueprint 5 — Enterprise RAG
  enterprise_rag:
    enabled: true
    embedding: nvidia/nv-embedqa-e5-v5
    reranker: nvidia/nv-rerankqa-mistral-4b-v3
    vector_store: faiss
    sources:
      - type: markdown
        paths: [README.md, onchain.md, model_card.md, dataset_card.md]
      - type: jsonl
        paths: [data/solana_clawd_merged.jsonl]
    output: data/rag_index/
    status: ready

  # Blueprint 6 — AIQ Evaluation
  aiq:
    enabled: true
    config: nvidia/configs/aiq_config.yaml
    modes:
      plan:  python3 nvidia/blueprints/aiq/agent.py --mode plan --strict
      model: python3 nvidia/blueprints/aiq/agent.py --mode model --adapter solanaclawd/solana-clawd-core-ai-1.5b-lora
      full:  python3 nvidia/blueprints/aiq/agent.py --mode full --strict
    eval_dataset: data/solana_clawd_eval.jsonl
    output: data/nvidia_aiq_eval.json
    thresholds:
      accuracy: 0.55
      latency_p95_s: 2.0
      refusal_rate: 1.0
      groundedness: 0.90
    status: ready

# ── HuggingFace publishing ────────────────────────────────────────────────────
hf:
  org: solanaclawd
  datasets:
    - id: solanaclawd/solana-clawd-nvidia-trading-factory-instruct
      source: data/nvidia_trading_factory_sft.jsonl
      card: data/nvidia_trading_factory_dataset_card.md
      status: published
    - id: solanaclawd/solana-tx-foundation-cpt
      source: data/tx_foundation_cpt.jsonl
      card: data/tx_foundation_cpt_dataset_card.md
      parquet: data/tx_foundation_cpt_processed
      status: ready_to_upload
  models:
    - id: solanaclawd/solana-tx-foundation-1.5b
      source: outputs/solana-tx-foundation-1.5b/sft
      card: outputs/solana-tx-foundation-1.5b-model-card.md
      status: training
    - id: solanaclawd/solana-clawd-core-ai-1.5b-lora
      status: published

# ── Safety gates ─────────────────────────────────────────────────────────────
safety:
  allowed_default_modes: [observer, paper]
  live_mode_generated: false
  secrets:
    source: environment
    persist_to_files: false
    forbidden_in_artifacts:
      - private keys
      - OAuth client secrets
      - Google ADC files
      - Hugging Face tokens
      - NVIDIA API keys
  execution_gates:
    - vulcan_preflight_ready
    - margin_review
    - position_review
    - orderbook_review
    - explicit_operator_approval

observability:
  logs_dir: outputs/job-launches
  release_audit: outputs/release_audit.json
  aiq_summary: outputs/nvidia_aiq_release_summary.json
  tx_preflight: outputs/tx_foundation_preflight.json
