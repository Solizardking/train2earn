# Solana Transaction Foundation Model - unified Qwen2.5-7B pipeline config
# Runs Blueprint 1 of the NVIDIA AI Blueprints Solana integration.
#
# Usage from ai-training/:
#   python3 nvidia/blueprints/transaction-foundation-model/pipeline.py --dry-run --smoke --stages cpt sft evaluate
#   python3 nvidia/blueprints/transaction-foundation-model/pipeline.py --stages cpt sft evaluate
#   bash scripts/launch_transaction_foundation_hf_job.sh a100-large 12h

schema_version: "2026-06-21"
pipeline: solana-transaction-foundation
release_channel: production
default_profile: release_first_pass
decision_date: "2026-06-21"
training_backend: unsloth

# Model decision:
# - Qwen2.5-7B is the foundation default: permissive license, long context,
#   strong code/math/structured-output behavior, and exact compatibility with
#   the existing Qwen LoRA target modules.
# - Hermes-3 remains useful for tool-use adapters, but is not the default base.
# - The legacy "glm52" configs in this repo currently point at Qwen2.5-7B.
base_model: "Qwen/Qwen2.5-7B-Instruct"
model_revision: "main"
model_family: qwen2.5
selected_model:
  id: "Qwen/Qwen2.5-7B-Instruct"
  size: "7.61B parameters"
  license: "apache-2.0"
  role: "primary CPT+SFT foundation base"
  rationale:
    - "Best fit across training quality, cost, deployability, and license for the current repo."
    - "Supports the same ChatML-style message training path used by the existing Qwen configs."
    - "Avoids the memory footprint of GLM-4.5-Air while materially improving over the 1.5B baseline."

unsloth:
  enabled: true
  trainer: "nvidia/blueprints/transaction-foundation-model/train_unsloth.py"
  install: "uv pip install unsloth --torch-backend=auto"
  load_in_4bit: true
  dtype: null
  use_gradient_checkpointing: "unsloth"
  packing_cpt: true
  packing_sft: false
  train_on_responses_only: false
  save_method: "adapter"
  notes:
    - "Requires a CUDA/Linux GPU path for practical 7B training."
    - "Reduces VRAM/time versus the plain TRL path; it does not remove the need for GPU compute or HF Jobs credits."

model_candidates:
  - id: "Qwen/Qwen2.5-1.5B-Instruct"
    decision: "fallback"
    role: "fast smoke runs and low-cost local baselines"
    source_configs:
      - "configs/deep_solana_cpt_config.yaml"
      - "configs/core_ai_lora_config.yaml"
      - "configs/lora_config.yaml"
      - "configs/autoresearch_wiki_lora_config_mac.yaml"
  - id: "Qwen/Qwen2.5-7B-Instruct"
    decision: "selected"
    role: "unified production rerun"
    source_configs:
      - "configs/glm52_lora_config.yaml"
      - "configs/glm52_lora_config_mac.yaml"
  - id: "NousResearch/Hermes-3-Llama-3.1-8B"
    decision: "adapter_candidate"
    role: "tool-use and trading-factory follow-up adapter"
    source_configs:
      - "configs/hermes3_lora_config.yaml"
      - "configs/nvidia_trading_factory_lora_config.yaml"
      - "configs/nvidia_trading_factory_lora_config_mac.yaml"
  - id: "zai-org/GLM-4.5-Air"
    decision: "not_selected_for_this_rerun"
    role: "future large MoE / hosted-inference candidate"
    note: "Strong agentic model, but 106B total parameters is outside this LoRA/HF Jobs default lane."
  - id: "zai-org/GLM-5.2-FP8"
    decision: "experimental_large_adapter"
    role: "true GLM-5.2 LoRA/CPT+SFT experiment using the unified dataset"
    note: "GLM-5.2 is a 753B model on Hugging Face. Use the FP8 checkpoint and multi-GPU H200/A100 hardware; the legacy glm52 configs in configs/ do not train this model."

output_name: "solana-tx-foundation-7b"
output_dir: "outputs/solana-tx-foundation-7b"
remote_output_dir: "/data/outputs/solana-tx-foundation-7b"
eval_output: "data/tx_foundation_eval.json"

profiles:
  smoke:
    max_cpt_examples: 8
    max_sft_examples: 8
    cpt_max_steps: 1
    sft_max_steps: 1
    cpt_max_seq_length: 512
    sft_max_seq_length: 512
    batch_size: 1
    grad_accum: 1
    push_to_hub: false
  release_first_pass:
    max_cpt_examples: null
    max_sft_examples: null
    cpt_max_steps: null
    sft_max_steps: null
    cpt_epochs: 1
    sft_epochs: 1
    push_to_hub: false
  full_alignment:
    max_cpt_examples: null
    max_sft_examples: null
    cpt_max_steps: null
    sft_max_steps: null
    cpt_epochs: 1
    sft_epochs: 3
    push_to_hub: false

glm52_experiment:
  base_model: "zai-org/GLM-5.2-FP8"
  full_precision_base_model: "zai-org/GLM-5.2"
  output_name: "solana-tx-foundation-glm52"
  remote_output_dir: "/data/outputs/solana-tx-foundation-glm52"
  hub_model_id: "solanaclawd/solana-tx-foundation-glm52-lora"
  recommended_flavor: "h200x8"
  minimum_practical_flavor: "a100x8"
  load_in_4bit: false
  target_modules: "all-linear"
  cpt_max_seq_length: 2048
  sft_max_seq_length: 4096
  batch_size: 1
  grad_accum: 16
  lora_r: 32
  lora_alpha: 64
  launch_command:
    - "BASE_MODEL=zai-org/GLM-5.2-FP8"
    - "LOAD_IN_4BIT=false"
    - "TARGET_MODULES=all-linear"
    - "OUTPUT_DIR=/data/outputs/solana-tx-foundation-glm52"
    - "HUB_MODEL_ID=solanaclawd/solana-tx-foundation-glm52-lora"
    - "bash scripts/launch_transaction_foundation_hf_job.sh h200x8 24h"
  status: "ready_to_dry_run; real launch requires HF Jobs credits and large-GPU availability"

# Source configs unified into this lane.
source_configs:
  - path: "configs/autoresearch_wiki_dataset_config.yaml"
    role: "autoresearch wiki SFT build inputs"
  - path: "configs/autoresearch_wiki_lora_config_mac.yaml"
    role: "Qwen 1.5B local LoRA baseline"
  - path: "configs/core_ai_lora_config.yaml"
    role: "core AI Qwen 1.5B SFT baseline"
  - path: "configs/deep_solana_cpt_config.yaml"
    role: "DeepSolana raw-text CPT lane"
  - path: "configs/eval_config.yaml"
    role: "shared Solana Clawd eval settings"
  - path: "configs/glm52_lora_config.yaml"
    role: "Qwen 7B cloud LoRA settings despite legacy filename"
  - path: "configs/glm52_lora_config_mac.yaml"
    role: "Qwen 7B Apple Silicon LoRA settings despite legacy filename"
  - path: "configs/hermes3_lora_config.yaml"
    role: "Hermes-3 8B tool-use candidate settings"
  - path: "configs/lora_config.yaml"
    role: "original Qwen 1.5B cloud SFT settings"
  - path: "configs/nvidia_trading_factory_config.yaml"
    role: "NVIDIA trading factory data sources and guardrails"
  - path: "configs/nvidia_trading_factory_lora_config_mac.yaml"
    role: "Hermes-3 8B local trading-factory adapter settings"
  - path: "configs/nvidia_trading_factory_lora_config.yaml"
    role: "Hermes-3 8B cloud trading-factory adapter settings"
  - path: "configs/realtime_dataset_config.yaml"
    role: "realtime research SFT build inputs"

# Data paths are relative to ai-training/.
cpt_data: "data/model_kit/tx_foundation_cpt_clean.jsonl"
sft_data: "data/model_kit/solana_clawd_reasoning_tooling_sft.jsonl"
legacy_cpt_data: "data/tx_foundation_cpt.jsonl"
legacy_sft_data: "data/solana_clawd_merged.jsonl"
deep_solana_data: "data/deep_solana_corpus.jsonl"

data_unification:
  optimizer: "scripts/optimize_training_data.py"
  manifest: "data/model_kit/training_data_optimization_manifest.json"
  message_inputs:
    - "data/core_ai_clawd_sft.jsonl"
    - "data/realtime_research_sft.jsonl"
    - "data/nvidia_trading_factory_sft.jsonl"
    - "data/solana_clawd_merged.jsonl"
    - "data/solana_clawd_seed.jsonl"
    - "data/model_kit/clawd_autoresearch_wiki_sft.jsonl"
  cpt_inputs:
    - "data/tx_foundation_cpt.jsonl"
  latest_counts:
    sft_kept: 64907
    cpt_kept: 17262
    generated_at: "2026-06-21T19:39:09+00:00"
  rebuild_command:
    - "python3 scripts/optimize_training_data.py"
    - "--input data/core_ai_clawd_sft.jsonl"
    - "--input data/realtime_research_sft.jsonl"
    - "--input data/nvidia_trading_factory_sft.jsonl"
    - "--input data/solana_clawd_merged.jsonl"
    - "--input data/solana_clawd_seed.jsonl"
    - "--input data/model_kit/clawd_autoresearch_wiki_sft.jsonl"
    - "--cpt-input data/tx_foundation_cpt.jsonl"

remote_training_data:
  repo_id: "solanaclawd/solana-tx-foundation-unified"
  repo_type: dataset
  private: false
  mount_path: "/mnt/tx-foundation"
  cpt_data: "/mnt/tx-foundation/tx_foundation_cpt_clean.jsonl"
  sft_data: "/mnt/tx-foundation/solana_clawd_reasoning_tooling_sft.jsonl"
  manifest: "/mnt/tx-foundation/training_data_optimization_manifest.json"
  publish_script: "scripts/publish_transaction_foundation_training_data.sh"
  publish_command: "bash scripts/publish_transaction_foundation_training_data.sh"

deep_solana_download:
  repo_id: "ordlibrary/DeepSolana-GPT2-bucket"
  script: "scripts/download_deep_solana.py"
  output: "data/deep_solana_corpus.jsonl"
  command: "python3 scripts/download_deep_solana.py --output data/deep_solana_corpus.jsonl --limit 0"
  status: "optional_not_present_locally"

# BigQuery data source.
# Auth: gcloud auth application-default login
# GCP billing project: $GOOGLE_CLOUD_PROJECT (default x402-477302)
bq_dataset: "bigquery-public-data.crypto_solana_mainnet_us"
bq_gcp_project_var: "GOOGLE_CLOUD_PROJECT"
bq_default_limit: 100000
bq_days: 90
bq_collector: "nvidia/blueprints/transaction-foundation-model/bigquery_collector.py"

# CPT hyperparameters.
cpt_max_seq_length: 2048
max_seq_length: 4096
cpt_epochs: 1
learning_rate_cpt: 1.0e-4
warmup_steps_cpt: 50
cpt_max_steps: null
max_cpt_examples: null
logging_steps_cpt: 10
save_steps_cpt: 500

# SFT hyperparameters.
sft_max_seq_length: 4096
max_length: 4096
sft_epochs: 1
learning_rate_sft: 1.0e-4
warmup_steps_sft: 100
sft_max_steps: null
max_sft_examples: null
logging_steps_sft: 10
save_steps_sft: 500
batch_size: 1
grad_accum: 16
lora_r: 32
lora_alpha: 64
lora_dropout: 0.05
save_total_limit: 3
bf16: null
gradient_checkpointing: true
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# NeMo decoder pretraining alternative path.
nemo_config: "nvidia/configs/pretrain_solana_decoder.yaml"
nemo_data_path: "data/model_kit/tx_foundation_cpt_clean.jsonl"

# Hub publishing. Requires HF_TOKEN in the shell or job secret store.
push_to_hub: false
hub_model_id: "solanaclawd/solana-tx-foundation-7b"
hub_dataset_id: "solanaclawd/solana-tx-foundation-cpt"
dataset_manifest: "data/tx_foundation_cpt_manifest.json"
dataset_card: "data/tx_foundation_cpt_dataset_card.md"
processed_dir: "data/model_kit/tx_foundation_cpt_clean_processed"

# Tokenizer metadata for the Solana transaction tokenizer path.
tokenizer_vocab_size: 4886

evaluation:
  eval_dataset: "data/solana_clawd_eval.jsonl"
  base_model: "Qwen/Qwen2.5-7B-Instruct"
  adapter_repo: "solanaclawd/solana-tx-foundation-7b"
  eval_split: "test"
  max_eval_samples: 100
  max_new_tokens: 512
  temperature: 0.2
  top_p: 0.9
  do_sample: true
  min_avg_score: 0.55
  require_refusal_alignment: true
  output: "data/tx_foundation_eval.json"

release_gate:
  require_preflight: true
  require_dataset_manifest: true
  require_model_card: true
  require_secret_scan: true
  require_hf_token_for_push: true
  block_live_execution: true

security:
  secrets_source: environment
  persist_secrets: false
  private_key_policy: never_load
  google_adc_policy: local_only_never_commit
  allowed_default_modes: [observer, paper]

publish:
  hugging_face_org: solanaclawd
  github: https://github.com/solizardking/solana-clawd-ai-training
  onchain_registry: https://onchain.x402.wtf
  ollama_namespace: 8bit
