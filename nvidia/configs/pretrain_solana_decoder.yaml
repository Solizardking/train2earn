# Solana Transaction Foundation Model — NeMo AutoModel decoder pretraining config
#
# Adapted from NVIDIA's pretrain_financial_decoder.yaml for Solana/Jupiter/Phoenix data.
# Tokenizer: SolanaTokenizerPipeline (src/tokenizer/solana_tokenizer.py)
#
# Launch (single GPU):
#   python3 nvidia/blueprints/transaction-foundation-model/train_decoder_model.py \
#       -c nvidia/configs/pretrain_solana_decoder.yaml \
#       --dataset.data_path data/tx_foundation_cpt.jsonl
#
# Launch (multi-GPU):
#   torchrun --nproc-per-node=4 nvidia/blueprints/transaction-foundation-model/train_decoder_model.py \
#       -c nvidia/configs/pretrain_solana_decoder.yaml \
#       --dataset.data_path data/tx_foundation_cpt.jsonl
#
# Config profile notes:
#   - Active values are release-oriented for the current 19,542-row CPT corpus.
#   - Use train_decoder_model.py CLI overrides for smoke runs:
#       --step_scheduler.max_steps 30
#       --step_scheduler.ckpt_every_steps 15
#       --step_scheduler.val_every_steps 15

# -- Model ----------------------------------------------------------------
# ~29M parameter decoder. vocab_size must match SolanaTokenizerPipeline.vocab_size.
# Verify: python -c "from src.tokenizer.solana_tokenizer import SolanaTokenizerPipeline; print(SolanaTokenizerPipeline().vocab_size)"
#
# Vocab breakdown (base vocab_size=4886):
#   PROG tokens  : 512  (program ID buckets)
#   IX tokens    : 12   (instruction type discriminators)
#   MINT tokens  : 4096 (mint address buckets)
#   AMT tokens   : 64   (log-bucketed transfer amounts)
#   FEE tokens   : 32   (log-bucketed fees)
#   SLOT tokens  : 128  (relative slot buckets)
#   SIDE tokens  : 2    (BUY / SELL)
#   STATUS tokens: 2    (SUCCESS / FAIL)
#   Special tokens: 8   (<BOS> <EOS> <PAD> <UNK> <TX> <SEP> <MASK> <CLS>)
# Total base   : 4856 + 30 specials = 4886
# With padding to 256-boundary: 5136 (for efficient CUDA memory alignment)
model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_config
  config:
    _target_: transformers.LlamaConfig
    vocab_size: 5136          # padded to 256-boundary for CUDA alignment (base=4886)
    hidden_size: 512
    num_hidden_layers: 8
    num_attention_heads: 8
    num_key_value_heads: 2    # GQA 4:1 ratio — saves 4× KV cache vs MHA
    intermediate_size: 1408   # SwiGLU: ~2.75× hidden (matches Llama-2 ratio)
    max_position_embeddings: 4096
    rope_theta: 500000.0      # high base for long-context RoPE extrapolation
    hidden_act: silu
    rms_norm_eps: 1.0e-5
    attention_dropout: 0.0
    tie_word_embeddings: false
    bos_token_id: 1
    eos_token_id: 2
    pad_token_id: 0

# -- Training Dataset -----------------------------------------------------
dataset:
  _target_: src/solana_clm_data.py:build_solana_clm_dataset
  data_path: null             # override via --dataset.data_path
  seq_length: 512             # ~46 txs per sequence (11 tokens/tx)
  prog_hash_size: 512
  mint_hash_size: 4096

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn: torch.utils.data.default_collate

# -- Validation Dataset ----------------------------------------------------
validation_dataset:
  _target_: src/solana_clm_data.py:build_solana_clm_dataset
  data_path: null
  seq_length: 512
  prog_hash_size: 512
  mint_hash_size: 4096

validation_dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn: torch.utils.data.default_collate

# -- Training Schedule -----------------------------------------------------
# Full training: 19,542 records × 3 epochs / 32 global batch ≈ 1,831 steps
# Demo (single GPU, quick test): set max_steps: 30
step_scheduler:
  global_batch_size: 32
  local_batch_size: 8         # 4× grad accum gives effective batch of 32
  ckpt_every_steps: 500
  val_every_steps: 250
  num_epochs: 3
  max_steps: 1831             # full 3-epoch run; set to 30 for a quick smoke test

# -- Distribution ----------------------------------------------------------
dist_env:
  backend: nccl
  timeout_minutes: 15

distributed:
  _target_: nemo_automodel.components.distributed.fsdp2.FSDP2Manager
  dp_size: none
  dp_replicate_size: 1
  tp_size: 1
  cp_size: 1
  sequence_parallel: false

# -- Loss ------------------------------------------------------------------
loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

# -- Optimizer -------------------------------------------------------------
optimizer:
  _target_: torch.optim.AdamW
  betas: [0.9, 0.95]
  lr: 0.0003
  weight_decay: 0.077

lr_scheduler:
  lr_decay_style: cosine
  lr_warmup_steps: 100
  min_lr: 0.000003

# -- RNG -------------------------------------------------------------------
rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 42
  ranked: true

# -- Checkpointing ---------------------------------------------------------
checkpoint:
  enabled: true
  checkpoint_dir: outputs/solana-tx-foundation-decoder-29m/checkpoints/
  model_save_format: safetensors
  save_consolidated: true
  # Hub model ID for the NeMo decoder variant (distinct from the Qwen2.5 TRL path)
  model_repo_id: solanaclawd/solana-tx-foundation-decoder-29m
