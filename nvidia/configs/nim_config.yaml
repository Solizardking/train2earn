# NVIDIA NIM configuration for Clawd agents
# Set NVIDIA_API_KEY in your environment — never write keys here.

nim:
  base_url: https://integrate.api.nvidia.com/v1
  # Override with CLAWD_NIM_URL env var to point at a self-hosted NIM endpoint
  base_url_var: CLAWD_NIM_URL
  api_key_var: NVIDIA_API_KEY
  timeout_s: 120
  connect_timeout_s: 10
  retries: 2
  retry_backoff_s: 2.0
  request_id_header: x-clawd-run-id
  stream_default: true

# ── Model IDs ─────────────────────────────────────────────────────────────────
models:
  # Primary reasoning — Nemotron Nano 30B (fast, cheap, OpenAI-compatible)
  # Override: NVIDIA_MODEL=nvidia/nemotron-3-ultra-550b-a55b for teacher runs
  foundation: nvidia/nemotron-3-nano-30b-a3b

  # Ultra 550B — teacher/distillation runs requiring maximum reasoning depth
  ultra: nvidia/nemotron-3-ultra-550b-a55b

  # Super 120B — balanced teacher for SFT labeling and CoT distillation
  reasoning_teacher: nvidia/nemotron-3-super-120b-a12b

  # Embedding model for RAG (Blueprint 5 — enterprise-rag)
  embedding: nvidia/nv-embedqa-e5-v5

  # Reranker for RAG
  reranker: nvidia/nv-rerankqa-mistral-4b-v3

  # Student model (fine-tuned locally, pushed to Hub)
  student: solanaclawd/solana-clawd-core-ai-1.5b-lora

  # Transaction foundation model (after Blueprint 1 CPT + SFT)
  tx_foundation: solanaclawd/solana-tx-foundation-1.5b

  # Local/offline fallback for development.
  ollama: solana-clawd-1.5b

model_roles:
  signal_reasoning: foundation
  distillation_teacher: ultra
  sft_labeling: reasoning_teacher
  rag_embedding: embedding
  rag_reranking: reranker
  local_student: student
  transaction_foundation: tx_foundation

# ── HuggingFace Inference API fallback ────────────────────────────────────────
# Used when NVIDIA_API_KEY is absent but HF_TOKEN is set.
# Set NVIDIA_USE_PIPELINE=1 to load weights locally instead of the HF API.
hf_inference:
  base_url: https://api-inference.huggingface.co/v1
  token_var: HF_TOKEN
  timeout_s: 120
  models:
    nano:  nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16
    ultra: nvidia/NVIDIA-Nemotron-3-Ultra-550B-A55B-BF16

# ── fal Serverless / Model API fallback ───────────────────────────────────────
# Used when FAL_API_KEY or FAL_KEY is set and NVIDIA/HF credentials are absent.
fal:
  key_vars: [FAL_API_KEY, FAL_KEY]
  model_var: FAL_MODEL_ID
  default_model: nvidia/nemotron-3-nano-omni
  reasoning_mode_default: no_think
  timeout_s: 180

# ── Endpoint priority chain ───────────────────────────────────────────────────
# Resolved at runtime by integration/clawd_nim_bridge.py and
# blueprints/signal-discovery/quantitative_signal_agent.py.
#
#   NVIDIA_API_KEY   →  NIM API   (models.foundation)
#   HF_TOKEN         →  HF Inference API  (hf_inference.models.nano)
#   FAL_API_KEY/FAL_KEY → fal Model API (fal.default_model)
#   CLAWD_INFERENCE_URL → self-hosted Clawd endpoint
#   CLAWD_ROUTER_KEY →  clawd-box-router.fly.dev free tier
#   (fallback)       →  Ollama localhost:11434
#
# Override active model:  NVIDIA_MODEL=nvidia/nemotron-3-ultra-550b-a55b
# Force local pipeline:   NVIDIA_USE_PIPELINE=1
routing:
  model_override_var: NVIDIA_MODEL
  local_pipeline_var: NVIDIA_USE_PIPELINE
  fal_key_vars: [FAL_API_KEY, FAL_KEY]
  fal_model_var: FAL_MODEL_ID
  clawd_inference_url_var: CLAWD_INFERENCE_URL
  clawd_api_key_var: CLAWD_API_KEY
  clawd_router_key_var: CLAWD_ROUTER_KEY
  ollama_base_url: http://localhost:11434/v1
  priority:
    - nim_api
    - hf_inference
    - fal
    - clawd_inference_url
    - clawd_router
    - ollama
  fail_closed_for_live_trading: true

defaults:
  max_tokens: 512
  temperature: 0.1
  top_p: 0.9
  seed: 42
  stream: true
  response_format: text
  redact_prompts_in_logs: true
  log_endpoint_name: true
  log_latency: true

# NIM endpoint after Blueprint 1 CPT fine-tuning completes.
# Set CLAWD_TX_NIM_URL to override.
tx_foundation_url: ${CLAWD_TX_NIM_URL:-https://integrate.api.nvidia.com/v1}

security:
  secrets_source: environment
  persist_request_bodies: false
  persist_response_bodies: false
  private_key_policy: never_load
  allowed_default_modes: [observer, paper]
  live_execution_requires_external_gate: true

healthcheck:
  enabled: true
  prompt: "Return the single word ok."
  max_tokens: 4
  expected_substring: ok

# ── HuggingFace artifact registry ────────────────────────────────────────────
hf:
  org: solanaclawd
  models:
    - solanaclawd/solana-clawd-core-ai-1.5b-lora   # live LoRA adapter
    - solanaclawd/solana-tx-foundation-1.5b         # Blueprint 1 (in training)
  datasets:
    - solanaclawd/solana-clawd-core-ai-instruct
    - solanaclawd/solana-clawd-instruct
    - solanaclawd/solana-clawd-nvidia-trading-factory-instruct
    - solanaclawd/solana-tx-foundation-cpt
