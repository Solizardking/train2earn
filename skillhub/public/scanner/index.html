<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Skill Verification Hub</title>
  <link rel="icon" href="./hub-graph.svg" type="image/svg+xml">
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0f0e;
      --panel: #151b19;
      --panel-strong: #1b2421;
      --ink: #edf7f3;
      --muted: #9baba6;
      --line: #2b3834;
      --green: #39d7a6;
      --blue: #75a8ff;
      --amber: #e8b44e;
      --red: #ff8b82;
      --red-deep: #c2564f;
      --purple: #b99cff;
      --soft-green: rgba(57, 215, 166, 0.14);
      --soft-blue: rgba(117, 168, 255, 0.14);
      --soft-amber: rgba(232, 180, 78, 0.14);
      --soft-red: rgba(255, 139, 130, 0.14);
      --soft-purple: rgba(185, 156, 255, 0.14);
      --shadow: 0 1px 2px rgba(0, 0, 0, 0.28), 0 18px 42px rgba(0, 0, 0, 0.24);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background:
        linear-gradient(180deg, #121815 0%, var(--bg) 58%, #0f100c 100%);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.45;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .shell {
      width: min(1440px, calc(100% - 32px));
      margin: 0 auto;
      padding: 22px 0 34px;
    }

    .topbar {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(260px, 420px);
      gap: 18px;
      align-items: stretch;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }

    .topbar::before {
      content: "";
      position: absolute;
      inset: -30px -10px auto -10px;
      height: 200px;
      background:
        radial-gradient(55% 100% at 15% 0%, rgba(57, 215, 166, 0.12), transparent 70%),
        radial-gradient(45% 100% at 92% 25%, rgba(117, 168, 255, 0.10), transparent 70%);
      pointer-events: none;
      z-index: -1;
      animation: ambient-drift 12s ease-in-out infinite;
    }

    .brand {
      display: flex;
      gap: 14px;
      align-items: center;
      min-width: 0;
    }

    .mark {
      position: relative;
      width: 44px;
      height: 44px;
      border: 1px solid var(--green);
      border-radius: 8px;
      background:
        linear-gradient(90deg, transparent 48%, rgba(57, 215, 166, 0.34) 48% 52%, transparent 52%),
        linear-gradient(0deg, transparent 48%, rgba(117, 168, 255, 0.26) 48% 52%, transparent 52%),
        var(--panel-strong);
      flex: 0 0 auto;
      animation: mark-shift 8s ease-in-out infinite;
    }

    .mark::after {
      content: "";
      position: absolute;
      inset: 9px;
      border: 1px solid rgba(232, 180, 78, 0.7);
      border-radius: 4px;
      animation: mark-scan 2.8s ease-in-out infinite;
    }

    h1 {
      margin: 0;
      font-size: 31px;
      line-height: 1.08;
      letter-spacing: 0;
    }

    .subhead {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .pulse-dot {
      position: relative;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      flex: 0 0 auto;
    }

    .pulse-dot::after {
      content: "";
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 1px solid var(--green);
      animation: pulse-ring 2.4s ease-out infinite;
    }

    .hero-asset {
      min-height: 126px;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .hero-asset img {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 126px;
      object-fit: cover;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
      margin: 18px 0;
    }

    .metric {
      min-height: 74px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .metric strong {
      display: block;
      font-size: 23px;
      line-height: 1;
      letter-spacing: 0;
      font-variant-numeric: normal;
    }

    .metric span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.2;
    }

    .analytics {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) minmax(0, 1.4fr);
      gap: 8px;
      margin: 0 0 18px;
    }

    .viz-card {
      min-width: 0;
      padding: 14px 16px 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .viz-card h3 {
      margin: 0 0 12px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #cbd9d3;
      font-weight: 750;
    }

    .stackbar {
      display: flex;
      height: 20px;
      gap: 2px;
      border-radius: 4px;
      overflow: hidden;
      background: #101614;
    }

    .stackbar .seg {
      height: 100%;
      min-width: 4px;
    }

    .stackbar .seg:first-child {
      border-radius: 4px 0 0 4px;
    }

    .stackbar .seg:last-child {
      border-radius: 0 4px 4px 0;
    }

    .viz-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
      list-style: none;
      margin: 12px 0 0;
      padding: 0;
      font-size: 12px;
      color: var(--muted);
    }

    .viz-legend li {
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .viz-legend i {
      width: 8px;
      height: 8px;
      border-radius: 2px;
      flex: 0 0 auto;
    }

    .viz-legend strong {
      color: var(--ink);
      font-weight: 700;
    }

    .barlist {
      display: grid;
      gap: 7px;
    }

    .barrow {
      display: grid;
      grid-template-columns: minmax(80px, 168px) minmax(0, 1fr) 34px;
      align-items: center;
      gap: 10px;
    }

    .barrow .barlabel {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--muted);
      font-size: 12px;
    }

    .barrow .bartrack {
      height: 10px;
      border-radius: 4px;
      background: #101614;
      overflow: hidden;
    }

    .barrow .barfill {
      display: block;
      height: 100%;
      border-radius: 4px;
      background: var(--blue);
    }

    .barrow .barvalue {
      text-align: right;
      font-size: 12px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--ink);
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(240px, 1.4fr) repeat(5, minmax(130px, 1fr));
      gap: 8px;
      margin-bottom: 16px;
    }

    input,
    select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #101614;
      color: var(--ink);
      padding: 0 11px;
    }

    input::placeholder {
      color: #74847f;
    }

    input:focus,
    select:focus,
    button:focus-visible {
      outline: 3px solid rgba(117, 168, 255, 0.28);
      outline-offset: 1px;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(360px, 0.95fr) minmax(420px, 1.35fr);
      gap: 14px;
      align-items: start;
    }

    .workspace > * {
      min-width: 0;
    }

    .list-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .kbd-hint {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: #74847f;
      font-size: 11px;
    }

    .kbd-hint kbd {
      display: inline-block;
      min-width: 16px;
      padding: 1px 5px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--panel-strong);
      color: var(--muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 10px;
      text-align: center;
    }

    .list {
      display: grid;
      gap: 8px;
      max-width: 100%;
      max-height: calc(100vh - 260px);
      overflow: auto;
      padding-right: 4px;
    }

    .skill-card {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      width: 100%;
      min-height: 112px;
      padding: 13px 13px 13px 12px;
      border: 1px solid var(--line);
      border-left: 3px solid var(--card-accent, var(--line));
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      text-align: left;
      box-shadow: var(--shadow);
      opacity: 0;
      animation: card-in 260ms ease both;
      animation-delay: calc(var(--i, 0) * 16ms);
      transition: border-color 140ms ease, box-shadow 140ms ease, transform 140ms ease;
    }

    .skill-card:hover {
      border-color: rgba(117, 168, 255, 0.45);
      box-shadow: var(--shadow);
      transform: translateY(-1px);
    }

    .skill-card[aria-current="true"] {
      border-color: var(--blue);
      box-shadow: 0 0 0 1px rgba(117, 168, 255, 0.28), 0 0 18px rgba(117, 168, 255, 0.16), var(--shadow);
    }

    .skill-title {
      margin: 0;
      font-size: 15px;
      font-weight: 750;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .skill-desc {
      display: -webkit-box;
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      overflow: hidden;
      text-overflow: ellipsis;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }

    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-content: start;
      justify-content: flex-end;
      max-width: 160px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #101614;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
    }

    .pill.green {
      border-color: rgba(57, 215, 166, 0.32);
      background: var(--soft-green);
      color: #91f1d2;
    }

    .pill.blue {
      border-color: rgba(117, 168, 255, 0.3);
      background: var(--soft-blue);
      color: #cfe0ff;
    }

    .pill.amber {
      border-color: rgba(232, 180, 78, 0.32);
      background: var(--soft-amber);
      color: #ffd78a;
    }

    .pill.red {
      border-color: rgba(255, 139, 130, 0.34);
      background: var(--soft-red);
      color: var(--red);
    }

    .pill.purple {
      border-color: rgba(185, 156, 255, 0.3);
      background: var(--soft-purple);
      color: var(--purple);
    }

    .detail {
      position: sticky;
      top: 14px;
      min-width: 0;
      max-height: calc(100vh - 28px);
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .detail-header {
      padding: 18px;
      border-bottom: 1px solid var(--line);
    }

    .detail-header h2 {
      margin: 0;
      font-size: 24px;
      line-height: 1.15;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .detail-header p {
      margin: 9px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .detail-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .copy {
      min-height: 34px;
      border: 1px solid var(--green);
      border-radius: 8px;
      background: var(--green);
      color: #06110f;
      padding: 0 12px;
      font-size: 13px;
      font-weight: 750;
      transition: transform 120ms ease, filter 120ms ease;
    }

    .copy:active {
      transform: translateY(1px);
    }

    .copy.secondary {
      border-color: var(--line);
      background: var(--panel-strong);
      color: var(--ink);
    }

    .detail-body {
      display: grid;
      gap: 18px;
      padding: 18px;
    }

    .section {
      display: grid;
      gap: 10px;
    }

    .section h3 {
      margin: 0;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0;
      color: #cbd9d3;
    }

    .kv {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .kv div,
    .check,
    .finding,
    .hash-row {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #101614;
      padding: 10px;
    }

    .kv span,
    .hash-row span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.2;
    }

    .kv strong,
    .hash-row code {
      display: block;
      margin-top: 4px;
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .checks {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .check {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-height: 48px;
      color: var(--muted);
      font-size: 12px;
    }

    .check strong {
      color: var(--ink);
      font-size: 12px;
    }

    .hashes {
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      overflow-wrap: anywhere;
    }

    .sev-summary {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .findings {
      display: grid;
      gap: 8px;
    }

    .finding {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 10px;
    }

    .finding p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .finding code {
      display: block;
      margin-top: 5px;
      color: #d7e5df;
      font-size: 11px;
      overflow-wrap: anywhere;
    }

    .empty {
      display: grid;
      gap: 12px;
      justify-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--muted);
      padding: 28px;
      text-align: center;
    }

    .empty .copy {
      justify-self: center;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translate(-50%, 12px);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border: 1px solid rgba(57, 215, 166, 0.4);
      border-radius: 999px;
      background: var(--panel-strong);
      color: var(--ink);
      font-size: 13px;
      font-weight: 700;
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
      z-index: 20;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .toast::before {
      content: "\2713";
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--green);
      color: #06110f;
      font-size: 10px;
      font-weight: 900;
    }

    @media (max-width: 1180px) {
      .metrics {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .analytics {
        grid-template-columns: 1fr;
      }

      .controls {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .controls input {
        grid-column: 1 / -1;
      }

      .workspace {
        grid-template-columns: 1fr;
      }

      .list,
      .detail {
        max-height: none;
      }

      .detail {
        position: static;
      }
    }

    @media (max-width: 760px) {
      .shell {
        width: min(100% - 22px, 1440px);
        padding-top: 14px;
      }

      .topbar,
      .controls,
      .metrics,
      .kv,
      .checks {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 26px;
      }

      .skill-card {
        grid-template-columns: 1fr;
      }

      .pills {
        justify-content: flex-start;
        max-width: none;
      }

      .barrow {
        grid-template-columns: 84px minmax(0, 1fr) 34px;
      }

      .kbd-hint {
        display: none;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 1ms !important;
      }

      .skill-card {
        opacity: 1;
      }
    }

    @keyframes mark-shift {
      0%, 100% {
        background-position: 0 0, 0 0, 0 0;
      }
      50% {
        background-position: 8px 0, 0 8px, 0 0;
      }
    }

    @keyframes mark-scan {
      0%, 100% {
        transform: scale(0.82);
        opacity: 0.45;
      }
      50% {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes ambient-drift {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(6px);
      }
    }

    @keyframes pulse-ring {
      0% {
        opacity: 0.9;
        transform: scale(0.7);
      }
      100% {
        opacity: 0;
        transform: scale(1.9);
      }
    }

    @keyframes card-in {
      from {
        opacity: 0;
        transform: translateY(5px);
      }
      to {
        opacity: 1;
        transform: none;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="mark" aria-hidden="true"></div>
        <div>
          <h1>Skill Verification Hub</h1>
          <p class="subhead"><span class="pulse-dot" aria-hidden="true"></span><span id="scanMeta">Loading scanner results</span></p>
        </div>
      </div>
      <div class="hero-asset">
        <img src="./hub-graph.svg" alt="Skill verification graph">
      </div>
    </header>

    <section class="metrics" id="metrics" aria-label="Scan metrics"></section>

    <section class="analytics" aria-label="Distribution insights">
      <div class="viz-card">
        <h3>Verification</h3>
        <div class="stackbar" id="verificationBar" role="img"></div>
        <ul class="viz-legend" id="verificationLegend"></ul>
      </div>
      <div class="viz-card">
        <h3>Risk posture</h3>
        <div class="stackbar" id="riskBar" role="img"></div>
        <ul class="viz-legend" id="riskLegend"></ul>
      </div>
      <div class="viz-card">
        <h3>Skills by category</h3>
        <div class="barlist" id="categoryBars"></div>
      </div>
    </section>

    <section class="controls" aria-label="Filters">
      <input id="search" type="search" autocomplete="off" placeholder="Search skills  (press /)">
      <select id="category" aria-label="Category"></select>
      <select id="surface" aria-label="Surface">
        <option value="">All surfaces</option>
        <option value="on-chain">On-chain</option>
        <option value="off-chain">Off-chain</option>
      </select>
      <select id="verification" aria-label="Verification">
        <option value="">All verification</option>
        <option value="verified">Verified</option>
        <option value="changed">Changed</option>
        <option value="missing">Missing</option>
        <option value="error">Error</option>
      </select>
      <select id="risk" aria-label="Risk">
        <option value="">All risk</option>
        <option value="required">Required</option>
        <option value="review">Review</option>
        <option value="pass">Pass</option>
      </select>
      <select id="sort" aria-label="Sort">
        <option value="risk">Sort by risk</option>
        <option value="name">Sort by name</option>
        <option value="category">Sort by category</option>
        <option value="files">Sort by files</option>
      </select>
    </section>

    <section class="workspace">
      <div>
        <div class="list-head">
          <span id="resultCount">0 skills</span>
          <span class="kbd-hint"><kbd>&uarr;</kbd><kbd>&darr;</kbd> navigate &middot; <kbd>/</kbd> search</span>
          <span id="anchorState">Registry pending</span>
        </div>
        <div class="list" id="skillList"></div>
      </div>
      <aside class="detail" id="detail"></aside>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="./scan-data.js"></script>
  <script>
    const data = window.SKILL_SCAN_RESULTS || { scannedAt: null, summary: {}, onchain: {}, skills: [] };
    const state = {
      search: "",
      category: "",
      surface: "",
      verification: "",
      risk: "",
      sort: "risk",
      selected: null,
    };

    const els = {
      scanMeta: document.getElementById("scanMeta"),
      metrics: document.getElementById("metrics"),
      category: document.getElementById("category"),
      surface: document.getElementById("surface"),
      verification: document.getElementById("verification"),
      risk: document.getElementById("risk"),
      sort: document.getElementById("sort"),
      search: document.getElementById("search"),
      resultCount: document.getElementById("resultCount"),
      anchorState: document.getElementById("anchorState"),
      skillList: document.getElementById("skillList"),
      detail: document.getElementById("detail"),
      toast: document.getElementById("toast"),
      verificationBar: document.getElementById("verificationBar"),
      verificationLegend: document.getElementById("verificationLegend"),
      riskBar: document.getElementById("riskBar"),
      riskLegend: document.getElementById("riskLegend"),
      categoryBars: document.getElementById("categoryBars"),
    };

    const riskRank = { required: 3, review: 2, pass: 1 };
    const severityRank = { CRITICAL: 5, HIGH: 4, MEDIUM: 3, LOW: 2, INFO: 1 };
    const severityOrder = ["CRITICAL", "HIGH", "MEDIUM", "LOW", "INFO"];

    init();

    function init() {
      restoreFromHash();
      renderMeta();
      renderMetrics();
      renderAnalytics();
      renderCategoryOptions();
      bindControls();
      bindKeyboardShortcuts();
      render();
    }

    function restoreFromHash() {
      const slug = decodeURIComponent((location.hash || "").replace(/^#/, ""));
      if (slug && data.skills.some((skill) => skill.slug === slug)) {
        state.selected = slug;
      }
    }

    function renderMeta() {
      const scanned = data.scannedAt ? new Date(data.scannedAt).toLocaleString() : "not scanned";
      const mode = data.scanner?.mode || "canonical";
      els.scanMeta.textContent = `${formatNumber(data.summary?.totalSkills || 0)} skills scanned from ${mode} inventory at ${scanned}`;
      const rootValid = data.onchain?.registryRootValid ? "root verified" : "root mismatch";
      els.anchorState.textContent = `${data.onchain?.anchorState || "not configured"} / ${rootValid}`;
    }

    function renderMetrics() {
      const summary = data.summary || {};
      const metrics = [
        ["Skills", summary.totalSkills],
        ["On-chain", summary.onChainSkills],
        ["Off-chain", summary.offChainSkills],
        ["Verified", summary.verification?.verified],
        ["Review", summary.risk?.review],
        ["Known installs", summary.installs?.totalKnownInstalls],
      ];
      els.metrics.innerHTML = metrics.map(([label, value]) => `
        <div class="metric">
          <strong>${formatMetric(value, label)}</strong>
          <span>${escapeHtml(label)}</span>
        </div>
      `).join("");
    }

    function renderAnalytics() {
      const summary = data.summary || {};
      const total = summary.totalSkills || 0;

      renderStackBar(
        els.verificationBar,
        els.verificationLegend,
        [
          { label: "Verified", value: summary.verification?.verified || 0, color: "var(--green)" },
          { label: "Changed", value: summary.verification?.changed || 0, color: "var(--amber)" },
          { label: "Missing", value: summary.verification?.missing || 0, color: "var(--red)" },
          { label: "Error", value: summary.verification?.error || 0, color: "var(--red-deep)" },
        ],
        total,
      );

      renderStackBar(
        els.riskBar,
        els.riskLegend,
        [
          { label: "Pass", value: summary.risk?.pass || 0, color: "var(--green)" },
          { label: "Review", value: summary.risk?.review || 0, color: "var(--amber)" },
          { label: "Required", value: summary.risk?.required || 0, color: "var(--red)" },
        ],
        total,
      );

      const categories = Object.entries(summary.categories || {}).sort((a, b) => b[1] - a[1]);
      const maxCategory = Math.max(1, ...categories.map(([, count]) => count));
      els.categoryBars.innerHTML = categories.map(([category, count]) => `
        <div class="barrow">
          <span class="barlabel" title="${escapeAttr(category)}">${escapeHtml(category)}</span>
          <span class="bartrack"><span class="barfill" style="width:${(count / maxCategory * 100).toFixed(1)}%"></span></span>
          <span class="barvalue">${formatNumber(count)}</span>
        </div>
      `).join("");
    }

    function renderStackBar(barEl, legendEl, segments, total) {
      const safeTotal = total || segments.reduce((sum, seg) => sum + seg.value, 0) || 1;
      const visible = segments.filter((seg) => seg.value > 0);

      barEl.innerHTML = visible.map((seg) => {
        const pct = (seg.value / safeTotal * 100);
        return `<span class="seg" style="flex-basis:${pct.toFixed(2)}%; background:${seg.color}" title="${escapeAttr(seg.label)}: ${formatNumber(seg.value)} (${pct.toFixed(1)}%)"></span>`;
      }).join("");

      legendEl.innerHTML = segments.map((seg) => `
        <li><i style="background:${seg.color}"></i>${escapeHtml(seg.label)} &middot; <strong>${formatNumber(seg.value)}</strong></li>
      `).join("");
    }

    function renderCategoryOptions() {
      const categories = [...new Set(data.skills.map((skill) => skill.category))].sort((a, b) => a.localeCompare(b));
      els.category.innerHTML = `<option value="">All categories</option>` + categories
        .map((category) => `<option value="${escapeAttr(category)}">${escapeHtml(category)}</option>`)
        .join("");
    }

    function bindControls() {
      for (const key of ["category", "surface", "verification", "risk", "sort"]) {
        els[key].addEventListener("change", () => {
          state[key] = els[key].value;
          render();
        });
      }
      els.search.addEventListener("input", () => {
        state.search = els.search.value.trim().toLowerCase();
        render();
      });
    }

    function bindKeyboardShortcuts() {
      document.addEventListener("keydown", (event) => {
        const active = document.activeElement;
        const tag = active?.tagName;
        const typing = tag === "INPUT" || tag === "SELECT" || tag === "TEXTAREA";

        if (event.key === "/" && !typing && !event.metaKey && !event.ctrlKey && !event.altKey) {
          event.preventDefault();
          els.search.focus();
          els.search.select();
          return;
        }

        if (event.key === "Escape" && active === els.search) {
          if (els.search.value) {
            els.search.value = "";
            state.search = "";
            render();
          } else {
            els.search.blur();
          }
          return;
        }

        if ((event.key === "ArrowDown" || event.key === "ArrowUp") && !typing) {
          event.preventDefault();
          moveSelection(event.key === "ArrowDown" ? 1 : -1);
        }
      });
    }

    function moveSelection(delta) {
      const skills = filteredSkills();
      if (!skills.length) return;
      const currentIndex = skills.findIndex((skill) => skill.slug === state.selected);
      const nextIndex = Math.min(skills.length - 1, Math.max(0, (currentIndex === -1 ? 0 : currentIndex) + delta));
      selectSkill(skills[nextIndex].slug);
      document.querySelector('.skill-card[aria-current="true"]')?.scrollIntoView({ block: "nearest" });
    }

    function selectSkill(slug) {
      state.selected = slug;
      history.replaceState(null, "", `#${encodeURIComponent(slug)}`);
      render();
    }

    function render() {
      const skills = filteredSkills();
      if (!skills.some((skill) => skill.slug === state.selected)) {
        state.selected = skills[0]?.slug || null;
      }
      els.resultCount.textContent = `${formatNumber(skills.length)} of ${formatNumber(data.skills.length)} skills`;
      renderList(skills);
      renderDetail(data.skills.find((skill) => skill.slug === state.selected) || skills[0] || null);
    }

    function filteredSkills() {
      let skills = data.skills.filter((skill) => {
        if (state.category && skill.category !== state.category) return false;
        if (state.surface && skill.surface?.type !== state.surface) return false;
        if (state.verification && skill.verification?.status !== state.verification) return false;
        if (state.risk && skill.risk?.status !== state.risk) return false;
        if (state.search) {
          const haystack = `${skill.slug} ${skill.name} ${skill.description} ${skill.category}`.toLowerCase();
          if (!haystack.includes(state.search)) return false;
        }
        return true;
      });

      skills = [...skills].sort((a, b) => {
        if (state.sort === "name") return a.slug.localeCompare(b.slug);
        if (state.sort === "category") return a.category.localeCompare(b.category) || a.slug.localeCompare(b.slug);
        if (state.sort === "files") return (b.stats?.filesScanned || 0) - (a.stats?.filesScanned || 0);
        return (riskRank[b.risk?.status] || 0) - (riskRank[a.risk?.status] || 0)
          || (b.risk?.score || 0) - (a.risk?.score || 0)
          || a.slug.localeCompare(b.slug);
      });

      return skills;
    }

    function renderList(skills) {
      if (!skills.length) {
        els.skillList.innerHTML = `
          <div class="empty">
            <span>No skills match the current filters.</span>
            <button class="copy secondary" type="button" id="resetFilters">Reset filters</button>
          </div>
        `;
        document.getElementById("resetFilters").addEventListener("click", resetFilters);
        return;
      }

      els.skillList.innerHTML = skills.map((skill, index) => {
        const current = skill.slug === state.selected ? "true" : "false";
        const accent = riskColor(skill.risk?.status) === "red" ? "var(--red)"
          : riskColor(skill.risk?.status) === "amber" ? "var(--amber)"
          : riskColor(skill.risk?.status) === "green" ? "var(--green)"
          : "var(--line)";
        return `
          <button class="skill-card" type="button" data-slug="${escapeAttr(skill.slug)}" aria-current="${current}" style="--i:${Math.min(index, 14)}; --card-accent:${accent}">
            <span>
              <span class="skill-title">${escapeHtml(skill.slug)}</span>
              <span class="skill-desc">${escapeHtml(skill.description)}</span>
            </span>
            <span class="pills">
              ${pill(skill.surface?.type || "unknown", skill.surface?.type === "on-chain" ? "purple" : "blue")}
              ${pill(skill.verification?.status || "missing", verificationColor(skill.verification?.status))}
              ${pill(skill.risk?.status || "pass", riskColor(skill.risk?.status))}
              ${pill(skill.install?.installs === null ? "installs unknown" : `${formatNumber(skill.install.installs)} installs`, "")}
            </span>
          </button>
        `;
      }).join("");

      els.skillList.querySelectorAll(".skill-card").forEach((card) => {
        card.addEventListener("click", () => selectSkill(card.dataset.slug));
      });
    }

    function resetFilters() {
      state.search = "";
      state.category = "";
      state.surface = "";
      state.verification = "";
      state.risk = "";
      els.search.value = "";
      els.category.value = "";
      els.surface.value = "";
      els.verification.value = "";
      els.risk.value = "";
      render();
    }

    function renderDetail(skill) {
      if (!skill) {
        els.detail.innerHTML = `<div class="empty">No skill selected.</div>`;
        return;
      }

      const checks = skill.verification?.checks || {};
      const findings = [...(skill.findings || [])].sort((a, b) => {
        return (severityRank[b.severity] || 0) - (severityRank[a.severity] || 0)
          || a.file.localeCompare(b.file)
          || a.line - b.line;
      });

      els.detail.innerHTML = `
        <div class="detail-header">
          <div class="pills">
            ${pill(skill.category, "")}
            ${pill(skill.surface?.type || "unknown", skill.surface?.type === "on-chain" ? "purple" : "blue")}
            ${pill(skill.verification?.status || "missing", verificationColor(skill.verification?.status))}
            ${pill(skill.risk?.level || "low", riskColor(skill.risk?.status))}
          </div>
          <h2>${escapeHtml(skill.slug)}</h2>
          <p>${escapeHtml(skill.description)}</p>
          <div class="detail-actions">
            <button class="copy" type="button" id="copyInstall">Copy install</button>
            <button class="copy secondary" type="button" id="copyHash">Copy bundle hash</button>
            <button class="copy secondary" type="button" id="copyLink">Copy link</button>
          </div>
        </div>
        <div class="detail-body">
          <section class="section">
            <h3>Snapshot</h3>
            <div class="kv">
              ${kv("Files", skill.stats?.filesScanned)}
              ${kv("Lines", skill.stats?.lineCount)}
              ${kv("Bytes", formatBytes(skill.stats?.bytesScanned || 0))}
              ${kv("Findings", skill.findings?.length || 0)}
              ${kv("Risk score", skill.risk?.score || 0)}
              ${kv("Installs", skill.install?.installs === null ? "unknown" : formatNumber(skill.install.installs))}
            </div>
          </section>

          <section class="section">
            <h3>Verification</h3>
            <div class="checks">
              ${check("Verification file", checks.verificationFile)}
              ${check("File hashes", checks.fileHashes)}
              ${check("Bundle hash", checks.bundleHash)}
              ${check("Merkle leaf", checks.merkleLeaf)}
              ${check("Registry member", checks.registryMembership)}
              ${check("Registry root", checks.registryRoot)}
              ${check("On-chain anchor", checks.onchainAnchor)}
            </div>
          </section>

          <section class="section">
            <h3>Hashes</h3>
            <div class="hashes">
              ${hashRow("Bundle hash", skill.verification?.bundleHash || "missing")}
              ${hashRow("Local bundle hash", skill.verification?.localBundleHash || "missing")}
              ${hashRow("Merkle leaf", skill.verification?.merkleLeaf || "missing")}
              ${hashRow("Local merkle leaf", skill.verification?.localMerkleLeaf || "missing")}
            </div>
          </section>

          <section class="section">
            <h3>Install</h3>
            <div class="hashes">
              ${hashRow("Command", skill.install?.command || "missing")}
              ${hashRow("Telemetry source", skill.install?.source || "unknown")}
            </div>
          </section>

          <section class="section">
            <h3>Findings</h3>
            ${renderSeveritySummary(skill.risk?.bySeverity)}
            <div class="findings">
              ${renderFindings(findings)}
            </div>
          </section>
        </div>
      `;

      document.getElementById("copyInstall").addEventListener("click", () => copyText(skill.install?.command || "", "Install command copied"));
      document.getElementById("copyHash").addEventListener("click", () => copyText(skill.verification?.bundleHash || "", "Bundle hash copied"));
      document.getElementById("copyLink").addEventListener("click", () => {
        history.replaceState(null, "", `#${encodeURIComponent(skill.slug)}`);
        copyText(location.href, "Link copied");
      });
    }

    function renderSeveritySummary(bySeverity) {
      if (!bySeverity) return "";
      const chips = severityOrder
        .filter((severity) => bySeverity[severity] > 0)
        .map((severity) => pill(`${bySeverity[severity]} ${severity}`, severityColor(severity)));
      if (!chips.length) return "";
      return `<div class="sev-summary">${chips.join("")}</div>`;
    }

    function renderFindings(findings) {
      if (!findings.length) return `<div class="empty">No scanner findings.</div>`;
      return findings.slice(0, 80).map((finding) => `
        <div class="finding">
          ${pill(finding.severity, severityColor(finding.severity))}
          <div>
            <strong>${escapeHtml(finding.ruleId)}</strong>
            <p>${escapeHtml(finding.message)} in ${escapeHtml(finding.file)}:${finding.line}</p>
            <code>${escapeHtml(finding.excerpt)}</code>
          </div>
        </div>
      `).join("");
    }

    function pill(label, color) {
      return `<span class="pill ${escapeAttr(color || "")}">${escapeHtml(label)}</span>`;
    }

    function kv(label, value) {
      return `<div><span>${escapeHtml(label)}</span><strong>${escapeHtml(formatMetric(value, label))}</strong></div>`;
    }

    function check(label, value) {
      const ok = value === true || value === "anchored" || value === "planned" || value === "anchor-ready";
      const text = typeof value === "boolean" ? (value ? "pass" : "fail") : (value || "missing");
      return `<div class="check"><span>${escapeHtml(label)}</span>${pill(text, ok ? "green" : "amber")}</div>`;
    }

    function hashRow(label, value) {
      return `<div class="hash-row"><span>${escapeHtml(label)}</span><code>${escapeHtml(value)}</code></div>`;
    }

    function verificationColor(status) {
      if (status === "verified") return "green";
      if (status === "changed") return "amber";
      return "red";
    }

    function riskColor(status) {
      if (status === "pass") return "green";
      if (status === "review") return "amber";
      if (status === "required") return "red";
      return "";
    }

    function severityColor(severity) {
      if (severity === "CRITICAL") return "red";
      if (severity === "HIGH") return "amber";
      if (severity === "MEDIUM") return "blue";
      if (severity === "LOW") return "purple";
      return "";
    }

    let toastTimer = null;
    async function copyText(value, message) {
      if (!value) return;
      try {
        await navigator.clipboard.writeText(value);
      } catch {
        const textarea = document.createElement("textarea");
        textarea.value = value;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand("copy");
        textarea.remove();
      }
      showToast(message || "Copied");
    }

    function showToast(message) {
      els.toast.textContent = message;
      els.toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => els.toast.classList.remove("show"), 1800);
    }

    function formatMetric(value, label) {
      if (value === null || value === undefined || value === "") {
        return label === "Known installs" ? "0" : "unknown";
      }
      if (typeof value === "number") return formatNumber(value);
      return String(value);
    }

    function formatNumber(value) {
      return new Intl.NumberFormat().format(Number(value || 0));
    }

    function formatBytes(bytes) {
      const units = ["B", "KB", "MB", "GB"];
      let value = Number(bytes || 0);
      let unit = 0;
      while (value >= 1024 && unit < units.length - 1) {
        value /= 1024;
        unit += 1;
      }
      return `${value.toFixed(unit === 0 ? 0 : 1)} ${units[unit]}`;
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      })[char]);
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, "&#96;");
    }
  </script>
</body>
</html>
