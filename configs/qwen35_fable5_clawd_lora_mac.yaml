# Local smoke train for Clawd Fable.
#
# Legacy filename retained for script compatibility. This is intentionally small:
# it verifies tokenizer/chat-template compatibility, LoRA attachment, dataset
# formatting, and trainer plumbing before spending cloud GPU time.
#
# Build data:
#   python3 scripts/prepare_clawd_code_dataset.py \
#     --format chatml --datasets clawd-code glint local --epochs 1 \
#     --output data/clawd_fable_sft.jsonl
#
# Train locally:
#   python3 scripts/train_lora.py --config configs/qwen35_fable5_clawd_lora_mac.yaml

base_model: "AliesTaha/fable-traces"
model_revision: "main"
torch_dtype: "bfloat16"
device_map: "mps"

dataset_repo: null
dataset_path: "data/clawd_fable_sft.jsonl"
dataset_revision: "main"
max_seq_length: 256
train_split: "train"
eval_split: null
max_train_samples: 32

output_dir: "outputs/clawd-fable-lora-local"
push_to_hub: false
hub_model_id: "solanaclawd/clawd-fable-lora"
hub_private: false

lora:
  r: 4
  alpha: 8
  dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

training:
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  num_train_epochs: 1
  max_steps: 4
  learning_rate: 1.5e-4
  lr_scheduler_type: "cosine"
  warmup_steps: 4
  weight_decay: 0.0
  optim: "adamw_torch"
  bf16: true
  fp16: false
  tf32: false
  gradient_checkpointing: false
  logging_steps: 1
  save_steps: 4
  save_total_limit: 1
  eval_strategy: "no"
  report_to: ["none"]
  seed: 42
  dataloader_num_workers: 0
  remove_unused_columns: false
  dataloader_pin_memory: false

quantization:
  enabled: false

sft:
  packing: false
  assistant_only_loss: true
  chat_template_kwargs: {}

eval:
  base_model: "AliesTaha/fable-traces"
  adapter_repo: "outputs/clawd-fable-lora-local"
  eval_dataset_repo: "solanaclawd/solana-clawd-eval"
  eval_split: "test"
  max_eval_samples: 16
  max_new_tokens: 160
  temperature: 0.4
  top_p: 0.9
  do_sample: true
  output_dir: "outputs/eval-clawd-fable-local"
  report_to: "json"
