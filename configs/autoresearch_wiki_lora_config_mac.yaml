# Mac-local LoRA config for the Clawd Autoresearch Wiki dataset.
#
# Build the dataset first:
#   python3 scripts/realtime_dataset_ingest.py --config configs/autoresearch_wiki_dataset_config.yaml
#
# Run:
#   python3 scripts/train_lora.py --config configs/autoresearch_wiki_lora_config_mac.yaml

base_model: "Qwen/Qwen2.5-1.5B-Instruct"
model_revision: "main"
torch_dtype: "bfloat16"
device_map: "mps"

dataset_repo: "solanaclawd/clawd-autoresearch-wiki-instruct"
dataset_revision: "main"
dataset_path: "data/model_kit/clawd_autoresearch_wiki_processed"
max_seq_length: 768
train_split: "train"
eval_split: "eval"

output_dir: "outputs/clawd-autoresearch-wiki-qwen15-lora-mac"
push_to_hub: false
hub_model_id: "solanaclawd/clawd-autoresearch-wiki-qwen15-lora"
hub_private: false

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

training:
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  per_device_eval_batch_size: 1
  num_train_epochs: 3
  max_steps: 24
  learning_rate: 1.5e-4
  lr_scheduler_type: "cosine"
  warmup_steps: 3
  weight_decay: 0.0
  optim: "adamw_torch"
  bf16: true
  fp16: false
  tf32: false
  gradient_checkpointing: false
  logging_steps: 2
  save_steps: 12
  save_total_limit: 2
  eval_steps: 12
  eval_strategy: "steps"
  report_to: ["none"]
  seed: 42
  dataloader_num_workers: 0
  remove_unused_columns: false
  dataloader_pin_memory: false

quantization:
  enabled: false

sft:
  packing: false
  assistant_only_loss: true
  chat_template_kwargs: {}
