dataset_name: "Solana Clawd NVIDIA Trading Factory Instruct"
repo_id: "solanaclawd/solana-clawd-nvidia-trading-factory-instruct"
output_jsonl: "data/nvidia_trading_factory_sft.jsonl"
processed_output_dir: "data/nvidia_trading_factory_processed"
manifest: "data/nvidia_trading_factory_manifest.json"
dataset_card: "data/nvidia_trading_factory_dataset_card.md"

train_ratio: 0.9
eval_ratio: 0.05
seed: 42

chunk_chars: 3600
chunk_overlap: 300
max_chunks_per_source: 3
min_chunk_chars: 500

markets:
  - "SOL spot"
  - "SOL-PERP"
  - "BTC-PERP"
  - "ETH-PERP"
  - "JUP spot"
  - "BONK spot"
  - "WIF spot"
  - "JTO spot"
  - "PYTH spot"
  - "mSOL spot"

factory_stages:
  - "data_ingestion"
  - "feature_engineering"
  - "alpha_research"
  - "scenario_generation"
  - "mean_cvar_optimization"
  - "execution_policy"
  - "risk_controls"
  - "backtesting"
  - "monitoring"
  - "governance"

nvidia_stack:
  - "NeMo Curator"
  - "NeMo Data Designer"
  - "Nemotron Parse"
  - "RAPIDS cuDF"
  - "RAPIDS cuML KDE"
  - "cuVS"
  - "PyTorch CUDA"
  - "NVIDIA HPC SDK"
  - "StdPar"
  - "cuOpt"
  - "cuFOLIO"
  - "TensorRT"
  - "NVIDIA NIM"

risk_policy:
  default_mode: "paper"
  live_trading_requires:
    - "explicit user confirmation"
    - "LIVE_TRADING=true in the execution environment"
    - "wallet/keypair configured outside the dataset and repo"
    - "risk score <= 6 unless a human overrides"
    - "pre-trade slippage, liquidation, funding, and exposure checks"
  max_default_leverage: 3
  refuse:
    - "front-running"
    - "sandwich attacks"
    - "wallet draining"
    - "private-key handling"
    - "sanctions evasion"
    - "market manipulation"

local_sources:
  - path: "trading_factory/README.md"
    source_type: "trading_factory_workspace"
  - path: "trading_factory/solana_factory/factory.py"
    source_type: "solana_trading_factory_adapter"
  - path: "trading_factory/solana_factory/vulcan_specs.py"
    source_type: "vulcan_strategy_specs"
  - path: "trading_factory/solana_factory/rise_client.py"
    source_type: "rise_readonly_client"
  - path: "trading_factory/solana_factory/cufolio_adapter.py"
    source_type: "cufolio_optimization_handoff"
  - path: "data/strategies/strategy_manifest.json"
    source_type: "generated_strategy_manifest"
  - path: "data/strategies/cufolio_mean_cvar_handoff.json"
    source_type: "generated_cufolio_handoff"
  - path: "data/strategies/rise_market_data_plan.json"
    source_type: "generated_rise_data_plan"
  - path: "data/strategies/vulcan_command_plans.json"
    source_type: "generated_vulcan_command_plans"
  - path: "trading_factory/cufolio/README.md"
    source_type: "cufolio_reference"
  - path: "trading_factory/cufolio/src/cvar_optimizer.py"
    source_type: "cufolio_cvar_optimizer"
  - path: "trading_factory/cufolio/src/cvar_parameters.py"
    source_type: "cufolio_cvar_parameters"
  - path: "trading_factory/cufolio/src/scenario_generation.py"
    source_type: "cufolio_scenario_generation"
  - path: "trading_factory/cufolio/src/rebalance.py"
    source_type: "cufolio_rebalancing"
  - path: "trading_factory/clawd-autoresearch-wiki/perps/vulcan.py"
    source_type: "autoresearch_vulcan_reference"
  - path: "trading_factory/clawd-autoresearch-wiki/perps/rise.py"
    source_type: "autoresearch_rise_reference"
  - path: "trading_factory/clawd-autoresearch-wiki/perps/paper.py"
    source_type: "autoresearch_paper_reference"
  - path: "trading_factory/clawd-autoresearch-wiki/strategy.md"
    source_type: "autoresearch_strategy_reference"
  - path: "trading_factory/clawd-autoresearch-wiki/strategy/ta.py"
    source_type: "autoresearch_ta_reference"
  - path: "trading_factory/clawd-autoresearch-wiki/strategy/grid.py"
    source_type: "autoresearch_grid_reference"
  - path: "trading_factory/clawd-autoresearch-wiki/strategy/twap.py"
    source_type: "autoresearch_twap_reference"
  - path: "perps/functions.py"
    source_type: "solana_perps_tools"
  - path: "perps/prompter.py"
    source_type: "solana_perps_prompts"
  - path: "perps/schema.py"
    source_type: "solana_perps_schema"
  - path: "perps/functioncall.py"
    source_type: "solana_perps_agent"
  - path: "onchainai.md"
    source_type: "onchain_ai_reference"
  - path: "README.md"
    source_type: "training_pipeline_reference"
  - path: "../AGENTS.md"
    source_type: "clawd_agent_catalog"
  - path: "data/realtime_research_dataset_manifest.json"
    source_type: "research_dataset_manifest"

  # ── NVIDIA Blueprint 4: Quantitative Signal Discovery ─────────────────────
  - path: "nvidia/blueprints/signal-discovery/signals.py"
    source_type: "nvidia_signal_detectors"
  - path: "nvidia/blueprints/signal-discovery/perps_signal_agent.py"
    source_type: "nvidia_perps_signal_agent"
  - path: "nvidia/blueprints/signal-discovery/quantitative_signal_agent.py"
    source_type: "nvidia_quantitative_signal_agent"
  - path: "nvidia/blueprints/signal-discovery/server.py"
    source_type: "nvidia_signal_server"
  - path: "nvidia/blueprints/signal-discovery/agent.py"
    source_type: "nvidia_signal_agent"
  - path: "nvidia/blueprints/signal-discovery/README.md"
    source_type: "nvidia_signal_discovery_readme"

  # ── NVIDIA Blueprint 2: Portfolio Optimization ────────────────────────────
  - path: "nvidia/blueprints/portfolio-optimization/mean_cvar.py"
    source_type: "nvidia_mean_cvar_optimizer"
  - path: "nvidia/blueprints/portfolio-optimization/scenarios.py"
    source_type: "nvidia_scenario_generator"
  - path: "nvidia/blueprints/portfolio-optimization/cufolio_clawd.py"
    source_type: "nvidia_cufolio_clawd"
  - path: "nvidia/blueprints/portfolio-optimization/phoenix_prices.py"
    source_type: "nvidia_phoenix_prices"
  - path: "nvidia/blueprints/portfolio-optimization/README.md"
    source_type: "nvidia_portfolio_optimization_readme"

  # ── NVIDIA Blueprint 1: Transaction Foundation Model ─────────────────────
  - path: "nvidia/blueprints/transaction-foundation-model/collect.py"
    source_type: "nvidia_tx_cpt_collector"
  - path: "nvidia/blueprints/transaction-foundation-model/pipeline.py"
    source_type: "nvidia_tx_foundation_pipeline"
  - path: "nvidia/blueprints/transaction-foundation-model/config.yaml"
    source_type: "nvidia_tx_foundation_config"
  - path: "nvidia/blueprints/transaction-foundation-model/dataset_builder.py"
    source_type: "nvidia_tx_dataset_builder"
  - path: "nvidia/blueprints/transaction-foundation-model/finetune.py"
    source_type: "nvidia_tx_finetune"
  - path: "nvidia/blueprints/transaction-foundation-model/train.py"
    source_type: "nvidia_tx_train"
  - path: "nvidia/blueprints/transaction-foundation-model/evaluate.py"
    source_type: "nvidia_tx_evaluate"
  - path: "nvidia/blueprints/transaction-foundation-model/README.md"
    source_type: "nvidia_tx_foundation_readme"

  # ── NVIDIA Configs ────────────────────────────────────────────────────────
  - path: "nvidia/configs/nemo_clawd_factory.yaml"
    source_type: "nvidia_nemo_factory_config"
  - path: "nvidia/configs/solana_tx_foundation.yaml"
    source_type: "nvidia_tx_foundation_pipeline_config"
  - path: "nvidia/configs/aiq_config.yaml"
    source_type: "nvidia_aiq_config"
  - path: "nvidia/configs/nim_config.yaml"
    source_type: "nvidia_nim_config"
  - path: "nvidia/configs/pretrain_solana_decoder.yaml"
    source_type: "nvidia_pretrain_solana_decoder"

  # ── Nemotron Ultra Agent ──────────────────────────────────────────────────
  - path: "nvidia/nemotron_ultra_agent.py"
    source_type: "nvidia_nemotron_ultra_agent"
  - path: "nvidia/NEMOTRON_ULTRA_AGENT.md"
    source_type: "nvidia_nemotron_ultra_agent_docs"

external_references:
  - title: "NVIDIA AI Algorithmic Trading Factories"
    url: "https://www.nvidia.com/en-us/use-cases/ai-algorithmic-trading-factories/"
    notes:
      - "Unify large-scale data ingestion, distributed training, fine-tuning, and low-latency inference."
      - "Use NeMo Curator, NeMo Data Designer, Nemotron Parse, RAPIDS, cuDF, cuML, cuVS, cuOpt, cuFOLIO, TensorRT, and NIM across the quant pipeline."
      - "Execution models should adapt to regime shifts, liquidity changes, and order-flow dynamics while minimizing slippage and transaction costs."
  - title: "NVIDIA Quantitative Portfolio Optimization Blueprint"
    url: "https://build.nvidia.com/nvidia/quantitative-portfolio-optimization"
    notes:
      - "GPU-accelerated, real-time, scalable Mean-CVaR portfolio optimization using cuOpt and RAPIDS."
      - "Supports CVaR, leverage, budgets, turnover, and cardinality constraints."
      - "Uses cuML KDE for scenario generation, cuDF for returns/backtesting, cuOpt LP/MILP solvers, and CVXPY for flexible modeling."
  - title: "Solizardking/cuFOLIO"
    url: "https://github.com/Solizardking/cuFOLIO"
    notes:
      - "Apache-2.0 GPU-accelerated portfolio optimization toolkit for NVIDIA cuOpt and CUDA-X Data Science."
      - "Includes Mean-CVaR optimization, scenario generation, backtesting, efficient frontier, and rebalancing examples."
      - "Designed around the NVIDIA PyTorch container and CUDA-specific cuOpt/cuML extras."
  - title: "Phoenix Vulcan CLI Strategies"
    url: "https://docs.phoenix.trade/cli/strategies"
    notes:
      - "Vulcan supports TWAP, grid, and TA-driven strategy runners over Phoenix perpetual futures."
      - "Strategy execution modes include paper, dry-run, confirm-each, and auto-execute; paper is the default for generated Clawd specs."
      - "TA configs are JSON rule sets and live modes require guardrails, preflight, and explicit approval."
  - title: "Phoenix Rise SDK"
    url: "https://docs.phoenix.trade/sdk/rise"
    notes:
      - "Developer-facing TypeScript and Rust SDK for Phoenix perpetual futures."
      - "Use HTTP clients for exchange, market, orderbook, trader state, candles, funding, and live market data."
      - "Instruction construction and signing stay outside training data and require wallet-controlled execution gates."
  - title: "Phoenix Account Health and Leverage Tiers"
    url: "https://docs.phoenix.trade/phoenix/margin-and-risk/account-health"
    notes:
      - "Phoenix account health is portfolio-aware and worsens with adverse price moves, funding paid, new size, risk-increasing orders, or collateral withdrawals."
      - "Risk scores around 1000 indicate liquidation boundary pressure; generated strategies must surface these checks before live escalation."
      - "Leverage tiers and margin review are required before live notional sizing."
  - title: "Solizardking/clawd-autoresearch-wiki perps"
    url: "https://github.com/Solizardking/clawd-autoresearch-wiki/tree/main/perps"
    notes:
      - "Local perps research reference with paper, Rise, and Vulcan wrappers."
      - "Used as internal reference material; current generated strategy specs are produced by the Clawd adapter against the latest Vulcan docs."
      - "Live execution remains blocked until explicit operator approval and Vulcan preflight readiness."
