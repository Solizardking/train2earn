dataset_name: "Clawd Autoresearch Wiki Instruct"
repo_id: "solanaclawd/clawd-autoresearch-wiki-instruct"

output_jsonl: "data/model_kit/clawd_autoresearch_wiki_sft.jsonl"
output_dir: "data/model_kit/clawd_autoresearch_wiki_processed"
manifest: "data/model_kit/clawd_autoresearch_wiki_manifest.json"
