# LoRA SFT config for the Core AI + Solana Clawd derived dataset.
#
# Build the dataset first:
#   python3 scripts/build_core_ai_dataset.py
#   python3 scripts/prepare_dataset.py \
#     --input data/core_ai_clawd_sft.jsonl \
#     --output data/core_ai_processed \
#     --train-ratio 0.9 --eval-ratio 0.05 --seed 42
#
# Local sanity training without Hub/W&B side effects:
#   python3 scripts/train_lora.py --config configs/core_ai_lora_config.yaml \
#     --no-push --no-eval --no-checkpoints --num-epochs 1
#
# W&B tracked training:
#   export WANDB_API_KEY=...
#   python3 scripts/train_lora.py --config configs/core_ai_lora_config.yaml --wandb

base_model: "Qwen/Qwen2.5-1.5B-Instruct"
model_revision: "main"
torch_dtype: "bfloat16"
device_map: "auto"

# Dataset
dataset_repo: "solanaclawd/solana-clawd-core-ai-instruct"
dataset_revision: "main"
dataset_path: "data/core_ai_processed"
max_seq_length: 4096
train_split: "train"
eval_split: "eval"

# Output
output_dir: "outputs/core-ai-clawd-1.5b-lora"
push_to_hub: false
hub_model_id: "solanaclawd/solana-clawd-core-ai-1.5b-lora"
hub_private: false

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

training:
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  per_device_eval_batch_size: 1
  num_train_epochs: 1
  max_steps: -1
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  weight_decay: 0.0
  optim: "adamw_torch"
  bf16: true
  fp16: false
  tf32: true
  gradient_checkpointing: true
  logging_steps: 10
  save_steps: 250
  save_total_limit: 2
  eval_steps: 250
  eval_strategy: "steps"
  # Use scripts/train_lora.py --wandb to switch this to W&B at runtime.
  report_to:
    - "none"
  seed: 42
  dataloader_num_workers: 2
  remove_unused_columns: false

quantization:
  enabled: true
  load_in_4bit: true
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: true

sft:
  packing: false
  assistant_only_loss: true
  chat_template_kwargs: {}
