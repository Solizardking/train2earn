# LoRA SFT training config for Solana Clawd AI model
#
# This config is consumed by scripts/train_lora.py.
# Override any field via CLI flag.

# Base model
base_model: "Qwen/Qwen2.5-1.5B-Instruct"
model_revision: "main"
torch_dtype: "bfloat16"
device_map: "auto"

# Dataset
dataset_repo: "solanaclawd/solana-clawd-instruct"
dataset_revision: "main"
max_seq_length: 4096
train_split: "train"
eval_split: "test"

# Output
output_dir: "/data/outputs/solana-clawd-1.5b-lora"
push_to_hub: true
hub_model_id: "solanaclawd/solana-clawd-1.5b-lora"
hub_private: false

# LoRA hyperparameters
lora:
  r: 16
  alpha: 32
  dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

# Training
training:
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  per_device_eval_batch_size: 2
  num_train_epochs: 3
  max_steps: -1                # -1 = use num_train_epochs
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  weight_decay: 0.0
  optim: "adamw_torch"
  bf16: true
  fp16: false
  tf32: true
  gradient_checkpointing: true
  logging_steps: 10
  save_steps: 200
  save_total_limit: 3
  eval_steps: 200
  eval_strategy: "steps"
  report_to:
    - "wandb"
  seed: 42
  dataloader_num_workers: 2
  remove_unused_columns: false

# Quantization (for low-VRAM GPUs)
quantization:
  enabled: true
  load_in_4bit: true
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: true

# SFT
sft:
  packing: false
  assistant_only_loss: true      # only train on assistant tokens (mask system+user)
  chat_template_kwargs: {}
