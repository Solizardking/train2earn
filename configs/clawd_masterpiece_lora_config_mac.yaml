# Mac-local LoRA config for the Clawd Solana conversational masterpiece dataset.
#
# Build:
#   python3 scripts/realtime_dataset_ingest.py --config configs/autoresearch_wiki_dataset_config.yaml
#   python3 scripts/build_masterpiece_dataset.py
#   python3 scripts/prepare_dataset.py \
#     --input data/model_kit/clawd_masterpiece_sft.jsonl \
#     --output data/model_kit/clawd_masterpiece_processed \
#     --train-ratio 0.9 --eval-ratio 0.05 --seed 42 --format messages
#
# Train:
#   HF_HOME=.hf HF_DATASETS_CACHE=.hf/datasets \
#     python3 scripts/train_lora.py --config configs/clawd_masterpiece_lora_config_mac.yaml

base_model: "Qwen/Qwen2.5-1.5B-Instruct"
model_revision: "main"
torch_dtype: "bfloat16"
device_map: "mps"

dataset_repo: "solanaclawd/clawd-solana-masterpiece-instruct"
dataset_revision: "main"
dataset_path: "data/model_kit/clawd_masterpiece_processed"
max_seq_length: 1024
train_split: "train"
eval_split: "eval"
max_eval_samples: 32

output_dir: "outputs/clawd-solana-masterpiece-qwen15-lora-mac"
push_to_hub: false
hub_model_id: "solanaclawd/clawd-solana-masterpiece-qwen15-lora"
hub_private: false

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

training:
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  per_device_eval_batch_size: 1
  num_train_epochs: 1
  max_steps: 96
  learning_rate: 1.5e-4
  lr_scheduler_type: "cosine"
  warmup_steps: 6
  weight_decay: 0.0
  optim: "adamw_torch"
  bf16: true
  fp16: false
  tf32: false
  gradient_checkpointing: false
  logging_steps: 4
  save_steps: 48
  save_total_limit: 2
  eval_steps: 96
  eval_strategy: "steps"
  report_to: ["none"]
  seed: 42
  dataloader_num_workers: 0
  remove_unused_columns: false
  dataloader_pin_memory: false

quantization:
  enabled: false

sft:
  packing: false
  assistant_only_loss: true
  chat_template_kwargs: {}
