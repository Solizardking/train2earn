# Curated-only drill pass for exact future-capability behavior.
# Starts from the v2 refined adapter and pushes the same public Hub repo.

base_model: "Qwen/Qwen2.5-1.5B-Instruct"
model_revision: "main"
torch_dtype: "bfloat16"
device_map: "mps"
resume_adapter_path: "outputs/clawd-solana-masterpiece-qwen15-lora-mac-v2"

dataset_path: "data/model_kit/clawd_future_drill_processed"
max_seq_length: 768
train_split: "train"
eval_split: "eval"
max_eval_samples: 32

output_dir: "outputs/clawd-solana-masterpiece-qwen15-lora-mac-v3"
push_to_hub: false
hub_model_id: "solanaclawd/clawd-solana-masterpiece-qwen15-lora"
hub_private: false

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

training:
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 1
  per_device_eval_batch_size: 1
  num_train_epochs: 1
  max_steps: 192
  learning_rate: 1.5e-4
  lr_scheduler_type: "cosine"
  warmup_steps: 8
  weight_decay: 0.0
  optim: "adamw_torch"
  bf16: true
  fp16: false
  tf32: false
  gradient_checkpointing: false
  logging_steps: 8
  save_steps: 96
  save_total_limit: 2
  eval_steps: 192
  eval_strategy: "steps"
  report_to: ["none"]
  seed: 53
  dataloader_num_workers: 0
  remove_unused_columns: false
  dataloader_pin_memory: false

quantization:
  enabled: false

sft:
  packing: false
  assistant_only_loss: true
  chat_template_kwargs: {}
