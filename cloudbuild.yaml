steps:
  # Build and push model-kit image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-east1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/train2earn-model-kit:$SHORT_SHA'
      - '-t'
      - 'us-east1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/train2earn-model-kit:latest'
      - 'model-kit/backend'
    id: 'build-model-kit'

  # Build and push site image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-east1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/train2earn-site:$SHORT_SHA'
      - '-t'
      - 'us-east1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/train2earn-site:latest'
      - 'site'
    id: 'build-site'

  # Deploy model-kit to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'train2earn-model-kit'
      - '--image=us-east1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/train2earn-model-kit:$SHORT_SHA'
      - '--region=us-east1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--set-env-vars=MODEL_KIT_GITHUB_REPO=https://github.com/Solizardking/train2earn,ONCHAIN_REGISTRY_HOME=https://onchain.x402.wtf'
    id: 'deploy-model-kit'
    waitFor: ['build-model-kit']

  # Deploy site to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'train2earn-site'
      - '--image=us-east1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/train2earn-site:$SHORT_SHA'
      - '--region=us-east1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--port=8080'
    id: 'deploy-site'
    waitFor: ['build-site']

  # Sync datasets from repo to GCS
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gsutil
    args:
      - '-m'
      - 'rsync'
      - '-r'
      - 'data'
      - 'gs://$PROJECT_ID-train2earn-datasets/sft/'
    id: 'sync-datasets'
    waitFor: ['-']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gsutil
    args:
      - '-m'
      - 'rsync'
      - '-r'
      - 'model-kit'
      - 'gs://$PROJECT_ID-train2earn-datasets/model_kit/'
    id: 'sync-model-kit'
    waitFor: ['-']

timeout: 900s
options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY